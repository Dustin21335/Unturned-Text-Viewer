<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unturned Text Viewer</title>
  <link rel="icon" href="https://i.imgur.com/SY3F9UN.jpeg">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Source+Code+Pro&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orienta&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Orienta&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Orienta&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Orienta&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Orienta&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>
<body>

    <h2>Unturned Text Viewer</h2>

  <div id="warning" class="warning">
    ⚠
    <div id="tooltip" class="tooltip"></div>
  </div>

  <div class="container">
    <div class="box">
      <h3>Input Text</h3>
      <textarea id="inputText" placeholder='Example: <color=lime>Hello world!</color>
Supported Tags: "b", "i", "u", "s", "color", "size", "align", "link", "sub", "sup"'></textarea>
    </div>
    <div class="box">
      <h3>Output</h3>
      <div id="output" class="output"></div>
    </div>
  </div>
  
  <div class="font-selector">
    <label for="fontSelect">Font: </label>
    <select id="fontSelect"></select>
  </div>
  
  <div class="font-selector">
    <label for="alignSelect">Align: </label>
    <select id="alignSelect"></select>
  </div>

  <script src="script.js"></script>
</body>
</html>
